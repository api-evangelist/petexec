aid: petexec
url: https://raw.githubusercontent.com/api-evangelist/petexec/refs/heads/main/apis.yml
name: PetExec
kind: company
description: PetExec is cloud-based business management software for dog daycares,
  boarding facilities, groomers, and trainers - scheduling, an owner portal, payments,
  and reporting. PetExec publishes a real, documented OAuth2 (password grant) REST
  API for existing customers and their developers, with a public GitHub examples
  repository covering owners, pets, boarding, daycare, grooming, scheduled services,
  vaccinations, billing, and reports. Access requires an active PetExec account -
  client credentials are self-issued from Company Preferences > Misc. Settings >
  Maintain API Applications, then exchanged for a Bearer token via a scoped password
  grant. PetExec was acquired by Togetherwork in November 2024 and joined the Gingr
  / Revelation Pets pet-care product group; PetExec is no longer accepting new
  customers and is being migrated toward Gingr, but the documented API remains live
  for existing PetExec accounts as of this review.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Pet Care
- Boarding
- Daycare
- Grooming
- Training
- Business Management
- Pet Business Software
created: '2026-07-04'
modified: '2026-07-04'
