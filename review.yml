sources:
  - url: https://www.petexec.net/features/api-for-developers
    type: Documentation
    note: Confirms PetExec publishes "a robust and fully capable API"; credentials created under Company Preferences > Misc. Settings > Maintain API Applications.
  - url: https://secure.petexec.net/api/apidoc/index.html
    type: APIReference
    note: apidoc.js interactive reference; JavaScript-rendered, no static/machine-readable spec exposed to fetch.
  - url: https://github.com/PetExec/API-Examples
    type: SourceCode
    note: Official PetExec-owned repository of PHP-Guzzle and JavaScript examples; primary source for every endpoint, scope, and base URL in this entry.
  - url: https://docs2.petexec.net/
    type: Documentation
    note: General technical documentation portal (release notes, FAQs); no API-specific content found here.
  - url: https://www.petexec.net/resources/business-operations/togetherwork-acquires-petexec
    type: Documentation
    note: Confirms the November 2024 Togetherwork acquisition and PetExec's status within the Gingr/Revelation Pets product group.
  - url: https://www.prweb.com/releases/togetherwork-acquires-petexec-expanding-its-industry-leading-footprint-in-serving-pet-care-businesses-with-quality-software-and-payments-solutions-302335963.html
    type: Documentation
    note: Press release corroborating the acquisition and PetExec no longer taking new customers.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or other server-push protocol surface exists on PetExec's
    documented API, so no AsyncAPI document was created. apis.yml was built
    from real endpoints and scopes transcribed out of PetExec's own public
    GitHub examples repository, organized into eight logical APIs (Owners,
    Pets, Reservations, Calendar, Services, Vaccinations, Billing & Reports,
    Company & Account), with an OpenAPI document, Postman collection, and
    Open Collection generated from that same confirmed endpoint set.
