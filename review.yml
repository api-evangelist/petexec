aid: petexec
name: PetExec
review:
  question: Does PetExec expose a documented public WebSocket API?
  answer: false
  date: '2026-07-04'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. PetExec's documented API surface -
    confirmed end to end via its public GitHub examples repository
    (github.com/PetExec/API-Examples) - is request/response REST over HTTPS
    (OAuth2 password grant plus resource endpoints). No server-push transport
    (WebSocket or Server-Sent Events) appears anywhere in the official
    examples, the apidoc reference, or the marketing/developer pages, so there
    is no realtime protocol surface to model.
findings:
  summary: |
    PetExec does not publish a documented public WebSocket API. It does,
    however, publish a real, working REST API for existing customers: OAuth2
    Resource Owner Password Credentials (password) grant against
    POST https://secure.petexec.net/api/token, using client credentials that
    a facility self-issues from Company Preferences > Misc. Settings >
    Maintain API Applications inside the PetExec console, then a Bearer token
    scoped to space-separated permissions (owner_read, owner_update,
    usercard_read, menu_read, report_read, and similar). PetExec's own public
    GitHub examples repository (github.com/PetExec/API-Examples, PHP-Guzzle
    and JavaScript) documents resource endpoints for owners, pets, pet
    types/breeds, vets, boarding, daycare, grooming, scheduled services,
    a company/owner calendar, vaccinations (shots), credit cards, purchase
    history, billing/statistics reports, and company configuration
    (locations, employees, lead sources, preferences, profile, menu). The
    interactive reference at
    https://secure.petexec.net/api/apidoc/index.html is a JavaScript-rendered
    apidoc.js site with no accessible machine-readable spec, so the GitHub
    examples repo is the most complete public source of technical detail and
    is what this review and the accompanying OpenAPI document are built from.
  corporateContext: |
    PetExec was acquired by Togetherwork in November 2024 and joined the
    Gingr / Revelation Pets pet-care product group. PetExec is no longer
    accepting new customers and Togetherwork is actively migrating existing
    PetExec accounts to Gingr (migration webinars, some customers reporting
    an added ~1% payment gateway fee). The API documented here remains
    published and referenced from petexec.net as of the review date, but its
    long-term availability should be treated as uncertain given the ongoing
    Gingr migration.
  sourceQualityNote: |
    PetExec's own official examples repository contains internal
    inconsistencies that are called out rather than silently smoothed over:
    some JavaScript examples call https://beta.petexec.net/api instead of
    https://secure.petexec.net/api for the same endpoints; credit card
    examples mix "user-card" and "userCard" path casing; and the JavaScript
    menu example (get_menu_for_authenticated_user.js) calls
    GET /owner/{ownerid} rather than GET /menu, which appears to be a
    copy/paste error against the correct PHP example (get_menu.php).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://secure.petexec.net/api
      documented: true
    - protocol: OAuth2 Password Grant
      scheme: https
      note: POST /token exchanges client credentials (Basic auth) plus a user's username/password for a scoped Bearer token.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in PetExec's developer page, apidoc reference, or public GitHub examples repository as of the review date.
  endpointsConfirmedRest:
