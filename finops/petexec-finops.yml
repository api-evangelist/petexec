description: >-
  FinOps view of PetExec spend. PetExec is a flat, quote-based per-facility
  software subscription (not a metered API product) with a separately billed
  payment-processing line for card transactions run through the platform. The
  API itself carries no incremental fee - it rides on the same subscription
  and processing-fee spend as the rest of the account. Cost visibility is
  therefore mostly a vendor-management exercise (subscription tier, number of
  locations/seats, processing volume and rate) rather than a usage-metering
  exercise. This is doubly true given PetExec's acquisition by Togetherwork
  and migration path toward Gingr - contract terms are in flux for existing
  customers.
notes: >-
  No FOCUS-aligned usage meters are published by PetExec. The meters below
  are modeled from the two billed line items reported by customers and
  third-party sources (subscription + processing), not sourced from a
  PetExec-published cost/usage report.
sources:
